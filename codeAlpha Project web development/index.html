<!DOCTYPE html>

<title>Mudassir Portfolio</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

nav {
  background:#111;
  padding:15px;
  text-align:center;
}

nav a {
  color:#fff;
  margin:15px;
  text-decoration:none;
  font-size:18px;
}

nav a:hover {
  color:#00d4ff;
}

header {
  text-align:center;
  padding:80px 20px;
}

header h1 {

}

header p {
  font-size:18px;

}

.projects {
  text-align:center;

}

.card {
  display:inline-block;
  background:#1e1e1e;
  margin:15px;
  padding:25px;
  border-radius:15px;
  width:250px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.08);
  box-shadow:0 0 15px #00d4ff;
}

button {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00d4ff;
  color:#000;
  cursor:pointer;
}

button:hover {
  background:#fff;
}

footer {
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:40px;
}

/* Mobile Responsive */
@media(max-width:600px){
  .card {
    display:block;
    width:80%;
    margin:auto;
  }
}
</style>
